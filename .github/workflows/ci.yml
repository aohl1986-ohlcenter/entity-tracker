name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Platzhalter — alle Routen sind dynamisch, beim Build wird keine DB kontaktiert
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?sslmode=require
          AUTH_SECRET: ci-dummy-secret
          CRON_SECRET: ci-dummy
